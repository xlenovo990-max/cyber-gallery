        /* 1. 整個網頁的基礎設定 */
        body {

            color: #e0e0ff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* 2. 頂部導覽列 */
        .navbar {
            background-color: #121225;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #ff007f; /* 賽博朋克霓虹粉邊框 */
        }
        .navbar h1 {
            margin: 0;
            font-size: 24px;
            color: #00ffff; /* 霓虹青色 */
            text-shadow: 0 0 10px #00ffff;
        }

        /* 3. 頁面內容包裹區 */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome-text {
            text-align: center;
            margin-bottom: 30px;
        }

        /* 4. 藝廊網格系統（核心排版） */
        .gallery-grid {
            display: flex;
            flex-direction: column; /* 在手機上垂直排列 */
            gap: 25px; /* 圖片之間的間距 */
        }

        }

        .art-card img {
            width: 100%;
            display: block;
        }

        }

        }

        }
